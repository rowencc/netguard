name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
  DEPLOY_PATH: /opt/netguard

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo ">>> Deploying NetGuard..."
            
            # Create deploy directory if not exists
            sudo mkdir -p ${{ env.DEPLOY_PATH }}
            sudo chown ${{ secrets.SERVER_USERNAME }}:${{ secrets.SERVER_USERNAME }} ${{ env.DEPLOY_PATH }}
            
            cd ${{ env.DEPLOY_PATH }}
            
            # Pull latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/rowencc/netguard.git .
            fi
            
            # Install backend dependencies
            cd backend
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt -q
            
            # Create database if not exists
            mysql -u root -e "CREATE DATABASE IF NOT EXISTS netguard" 2>/dev/null || true
            
            # Restart backend
            cd ..
            pkill -f "uvicorn app.main:app" 2>/dev/null || true
            sleep 1
            cd backend
            nohup venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port 8089 \
              > ../logs/backend.log 2>&1 &
            
            # Restart frontend (serve built files)
            cd ../frontend
            pkill -f "python3 -m http.server 3000" 2>/dev/null || true
            sleep 1
            nohup python3 -m http.server 3000 \
              > ../logs/frontend.log 2>&1 &
            
            echo ">>> Deployment complete!"

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf http://${{ secrets.SERVER_HOST }}:8089/ || echo "Backend health check failed"
